      - name: Setup KernelSU Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          # Hardcode the exact defconfig from your screenshot
          DEFCONFIG_FILE="arch/arm64/configs/light_defconfig"
          
          # Inject KSU and Kprobe configs
          # Using echo -e "\n..." ensures it starts on a new line safely
          echo -e "\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG_FILE

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$(pwd)/../toolchain/bin:$PATH
          
          # Pass arguments inline to prevent Make from dropping them
          make O=out ARCH=arm64 SUBARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang light_defconfig
          make -j$(nproc) O=out ARCH=arm64 SUBARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang

