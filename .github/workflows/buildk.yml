      - name: Setup KernelSU Next & Force-Fix Build
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          DEFCONFIG_FILE="arch/arm64/configs/light_defconfig"
          
          # Inject KSU, Kprobe, disable WERROR, and DISABLE FRAME WARNINGS
          echo -e "\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y\nCONFIG_WERROR=n\nCONFIG_FRAME_WARN=0" >> $DEFCONFIG_FILE

          # Fix Xiaomi's missing proprietary vendor directories
          mkdir -p vendor/xiaomi/kernel_modules/mihw
          touch vendor/xiaomi/kernel_modules/mihw/Makefile
          
          echo "CONFIG_MIHW=n" >> $DEFCONFIG_FILE
          sed -i 's/obj-y += mihw\//# obj-y += mihw\//g' drivers/Makefile || true
          sed -i 's/obj-$(CONFIG_MIHW) += mihw\//# obj-$(CONFIG_MIHW) += mihw\//g' drivers/Makefile || true
