name: Build KSU Next Kernel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
          kernel-branch: light-u-oss
          config: light_debug_defconfig
          arch: arm64
          android-version: 14
          aosp-clang: true
          aosp-gcc: true
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/KernelSU-Next/KernelSU-Next
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
