name: Build KSU Next for Poco M4 5G (light)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
          
      - name: Download Proton Clang Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain
          
      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 -b light-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel-source
          
      - name: Inject KernelSU Next
        run: |
          cd kernel-source
          curl -ls https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -
          
      - name: Compile Kernel
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          
          # Tumhara bataya hua defconfig
          make O=out ARCH=arm64 defconfig
          
          # Build process start
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
      - name: Setup AnyKernel3 and Package
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          
          # Device name update in script for flashability
          sed -i 's/device.name1=maguro/device.name1=light/g' anykernel.sh
          
          # Copy compiled kernel image
          find ../kernel-source/out/arch/arm64/boot -name "Image.gz*" -exec cp {} . \;
          find ../kernel-source/out/arch/arm64/boot -name "Image" -exec cp {} . \;
          
          # Zip create karna
          zip -r9 ../KSU-Next-Poco-M4-5G.zip *
          
      - name: Upload Kernel Zip
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Poco-M4-5G
          path: KSU-Next-Poco-M4-5G.zip

