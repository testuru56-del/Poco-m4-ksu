name: Build KSU Next (Only Image)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libyaml-dev clang-14 lld-14 llvm-14
          
      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 -b light-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel-source
          
      - name: Fix Xiaomi Missing Vendor Modules (MIHW NUKE 2.0)
        run: |
          cd kernel-source
          # 1. Folder ko poori tarah delete karna
          rm -rf drivers/mihw
          # 2. Makefile se hatana
          sed -i '/mihw/d' drivers/Makefile || true
          # 3. Kconfig se reference hatana (YEH NAYA FIX HAI)
          sed -i '/mihw/d' drivers/Kconfig || true
          # 4. Har configuration file mein isko OFF karna
          find arch/arm64/configs -type f -exec sed -i 's/CONFIG_MIHW=y/# CONFIG_MIHW is not set/g' {} +
          
      - name: Deep Patch DTC & Headers
        run: |
          cd kernel-source
          find scripts/dtc -type f -name "*.c*" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} +
          find scripts/dtc -type f -name "*.l" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} +
          
      - name: Inject KernelSU Next & Apply Surgery
        run: |
          cd kernel-source
          curl -ls https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -
          
          # Patch 1: Header fix
          grep -rl 'linux/pgtable.h' KernelSU-Next/ | xargs sed -i 's/linux\/pgtable.h/asm\/pgtable.h/g' || true
          
          # Patch 2: SURGERY - 4.19 compatibility file_wrapper.c
          sed -i 's/return orig->f_op->iopoll(kiocb, spin);/\/\/return orig->f_op->iopoll(kiocb, spin);/' drivers/kernelsu/infra/file_wrapper.c || true
          sed -i 's/p->ops.iopoll = fp->f_op->iopoll ? ksu_wrapper_iopoll : NULL;/p->ops.iopoll = NULL;/' drivers/kernelsu/infra/file_wrapper.c || true
          
      - name: Configure Kernel
        run: |
          cd kernel-source
          # Using Light defconfig strictly
          make O=out ARCH=arm64 light_defconfig
          
          echo "CONFIG_KPROBES=y" >> out/.config
          echo "CONFIG_HAVE_KPROBES=y" >> out/.config
          echo "CONFIG_KPROBE_EVENTS=y" >> out/.config
          echo "CONFIG_OVERLAY_FS=y" >> out/.config
          
          # Extra security to ensure MIHW is disabled
          echo "# CONFIG_MIHW is not set" >> out/.config
          
          # Disable Memory Protections causing linker crash
          sed -i 's/CONFIG_LTO=y/# CONFIG_LTO is not set/g' out/.config
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/g' out/.config
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/g' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig
          
      - name: Compile Kernel
        run: |
          cd kernel-source
          set -e
          set -o pipefail
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 STRIP=llvm-strip-14 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTCFLAGS="-fcommon -w" HOSTLDFLAGS="-z muldefs" KCFLAGS="-w" 2>&1 | tee ../build.log
          
      - name: Upload Logs & Images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Result
          path: |
            build.log
            kernel-source/out/arch/arm64/boot/Image*
