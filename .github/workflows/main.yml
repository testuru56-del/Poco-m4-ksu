name: Build KernelSU Next - POCO M4 5G

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

steps:
  - name: Install Dependencies
    run: |
      sudo apt update
      sudo apt install -y \
        bc bison flex build-essential \
        curl git zip cpio rsync \
        libssl-dev libelf-dev \
        gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi

  - name: Clone Kernel Source
    run: |
      git clone --depth=1 \
        -b light-u-oss \
        https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
        kernel

  - name: Clone Proton Clang
    run: |
      git clone --depth=1 \
        https://github.com/kdrag0n/proton-clang.git \
        clang

  - name: Remove MIHW
    run: |
      cd kernel

      rm -rf drivers/mihw || true

      sed -i '/mihw/d' drivers/Makefile || true
      sed -i '/mihw/d' drivers/Kconfig || true

      find arch/arm64/configs -type f \
        -exec sed -i \
        's/CONFIG_MIHW=y/# CONFIG_MIHW is not set/g' {} +

  - name: Integrate KernelSU Next
    run: |
      cd kernel

      curl -LSs \
      https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh \
      | bash -

  - name: Fix 4.19 Mount Header
    run: |
      cd kernel

      FILE="drivers/kernelsu/infra/su_mount_ns.c"

      if [ -f "$FILE" ]; then
        sed -i \
        's@<uapi/linux/mount.h>@<linux/mount.h>@g' \
        "$FILE" || true
      fi

  - name: Configure Kernel
    run: |
      cd kernel

      mkdir -p out

      make O=out ARCH=arm64 light_defconfig

      echo "CONFIG_KPROBES=y" >> out/.config
      echo "CONFIG_HAVE_KPROBES=y" >> out/.config
      echo "CONFIG_KPROBE_EVENTS=y" >> out/.config
      echo "CONFIG_OVERLAY_FS=y" >> out/.config

      make O=out ARCH=arm64 olddefconfig

  - name: Build Kernel
    run: |
      cd kernel

      export ARCH=arm64
      export SUBARCH=arm64
      export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

      make -j$(nproc) \
        O=out \
        ARCH=arm64 \
        CC=clang \
        LD=ld.lld \
        AR=llvm-ar \
        NM=llvm-nm \
        OBJCOPY=llvm-objcopy \
        OBJDUMP=llvm-objdump \
        STRIP=llvm-strip \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi-

  - name: Upload Kernel
    uses: actions/upload-artifact@v4
    with:
      name: POCO-M4-5G-KernelSU-Next
      path: |
        kernel/out/arch/arm64/boot/Image*
        kernel/out/arch/arm64/boot/**/*.dtb

  - name: Upload Config
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: Kernel-Config
      path: kernel/out/.config
