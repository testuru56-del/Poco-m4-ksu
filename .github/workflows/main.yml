name: Build KSU Next for Poco M4 5G (light)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
          
      - name: Download Proton Clang Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain
          
      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 -b light-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel-source
          
      - name: Inject KernelSU Next
        run: |
          cd kernel-source
          curl -ls https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -
          
      - name: Compile Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          
          # PATH clash rokne ke liye direct paths use kar rahe hain
          export TC_DIR=$GITHUB_WORKSPACE/toolchain/bin
          
          # Config build (Host system tools ke liye native GCC)
          make O=out ARCH=arm64 HOSTCC=gcc HOSTCXX=g++ defconfig
          
          # Main Kernel build (Absolute path se compiler call hoga)
          make -j$(nproc --all) O=out ARCH=arm64 CC=$TC_DIR/clang CROSS_COMPILE=$TC_DIR/aarch64-linux-gnu- CROSS_COMPILE_ARM32=$TC_DIR/arm-linux-gnueabi- HOSTCC=gcc HOSTCXX=g++
          
      - name: Setup AnyKernel3 and Package
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          
          sed -i 's/device.name1=maguro/device.name1=light/g' anykernel.sh
          
          find ../kernel-source/out/arch/arm64/boot -name "Image.gz*" -exec cp {} . \;
          find ../kernel-source/out/arch/arm64/boot -name "Image" -exec cp {} . \;
          
          zip -r9 ../KSU-Next-Poco-M4-5G.zip *
          
      - name: Upload Kernel Zip
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Poco-M4-5G
          path: KSU-Next-Poco-M4-5G.zip
