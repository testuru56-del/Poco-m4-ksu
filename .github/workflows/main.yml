name: Build KSU Next for Poco M4 5G (light)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          
      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 -b light-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel-source
          
      - name: Deep Patch for DTC & Warnings
        run: |
          cd kernel-source
          
          # 1. DTC 'yylloc' Multiple Definition Fix (Surgical Patch)
          echo "HOSTCFLAGS_dtc-lexer.lex.o += -fcommon" >> scripts/dtc/Makefile
          echo "HOSTCFLAGS_dtc-parser.tab.o += -fcommon" >> scripts/dtc/Makefile
          echo "KBUILD_HOSTCFLAGS += -fcommon" >> Makefile
          
          # 2. Poore kernel tree se -Werror ko jad se mitana taaki koi choti warning build na roke
          find . -name Makefile -exec sed -i 's/-Werror//g' {} +
          
      - name: Inject KernelSU Next
        run: |
          cd kernel-source
          curl -ls https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -
          
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/defconfig
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/defconfig
          
      - name: Compile Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          
          make O=out ARCH=arm64 defconfig
          make -j$(nproc --all) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
      - name: Setup AnyKernel3 and Package
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          
          sed -i 's/device.name1=maguro/device.name1=light/g' anykernel.sh
          
          find ../kernel-source/out/arch/arm64/boot -name "Image.gz*" -exec cp {} . \;
          find ../kernel-source/out/arch/arm64/boot -name "Image" -exec cp {} . \;
          
          zip -r9 ../KSU-Next-Poco-M4-5G.zip *
          
      - name: Upload Kernel Zip
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Poco-M4-5G
          path: KSU-Next-Poco-M4-5G.zip

