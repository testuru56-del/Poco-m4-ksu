name: Build KSU Next (Only Image)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libyaml-dev clang-14 lld-14 llvm-14
          
      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 -b light-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel-source
          
      - name: Fix Xiaomi Missing Vendor Modules (mihw)
        run: |
          cd kernel-source
          sed -i '/mihw/d' drivers/Makefile || true
          
      - name: Deep Patch DTC & Disable Protections
        run: |
          cd kernel-source
          find scripts/dtc -type f -name "*.c*" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} +
          find scripts/dtc -type f -name "*.l" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} +
          
      - name: Inject KernelSU Next & Fix 4.19 Headers
        run: |
          cd kernel-source
          curl -ls https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -
          
          # FIX: 4.19 Kernel compatibility patch for KernelSU
          echo "Patching pgtable.h for 4.19 compatibility..."
          find drivers/kernelsu -type f -name "*.c" -exec sed -i 's/<linux\/pgtable.h>/<asm\/pgtable.h>/g' {} +
          find drivers/kernelsu -type f -name "*.h" -exec sed -i 's/<linux\/pgtable.h>/<asm\/pgtable.h>/g' {} +
          
      - name: Configure Kernel (STRICTLY defconfig)
        run: |
          cd kernel-source
          
          echo "========================================="
          echo "✅ USING REAL DEVICE CONFIG: defconfig"
          echo "========================================="
          
          make O=out ARCH=arm64 defconfig
          
          echo "CONFIG_KPROBES=y" >> out/.config
          echo "CONFIG_HAVE_KPROBES=y" >> out/.config
          echo "CONFIG_KPROBE_EVENTS=y" >> out/.config
          echo "CONFIG_OVERLAY_FS=y" >> out/.config
          
          sed -i 's/CONFIG_LTO=y/# CONFIG_LTO is not set/g' out/.config
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/g' out/.config
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/g' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig
          
      - name: Compile Kernel
        run: |
          cd kernel-source
          set -e
          set -o pipefail
          
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang-14 \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTCFLAGS="-fcommon -w" \
            HOSTLDFLAGS="-z muldefs" \
            KCFLAGS="-w" 2>&1 | tee ../build.log
          
      - name: Upload Error Log (If Failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          
      - name: Extract Raw Kernel Images
        if: success()
        run: |
          mkdir -p raw-images
          find kernel-source/out/arch/arm64/boot -name "Image*" -exec cp {} raw-images/ \;
          
      - name: Upload Raw Image (.img files)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-Raw-Images
          path: raw-images/*
