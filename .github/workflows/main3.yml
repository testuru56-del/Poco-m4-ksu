name: Fast Repack KSU Boot Image (Correct Sequence)

on:
  workflow_dispatch:

jobs:
  repack-boot:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip python3-pip
          pip3 install gdown

      - name: Download Stock Boot & Tool
        run: |
          mkdir repack
          cd repack
          
          echo "Downloading Stock Boot (64MB)..."
          gdown "1FWNB6uFzPOsXR3o5APSP3k-Wg2hRYMdw" -O stock_boot.img
          
          echo "Downloading Official Magisk Tool..."
          wget -qO magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: Repack Image (CORRECT SEQUENCE)
        run: |
          cd repack
          
          echo "1. Unpacking Stock Boot..."
          ./magiskboot unpack stock_boot.img
          
          echo "2. Deleting Old Stock Engine..."
          rm -f kernel
          
          echo "3. Injecting New KSU Engine..."
          # Ab hum naya engine unpack hone ke BAAD laa rahe hain taaki overwrite na ho!
          gdown "1B4vYn0ZuPesPb40Q4ubs42_qrhxYyjuT" -O kernel
          
          echo "4. Repacking Boot Image..."
          ./magiskboot repack stock_boot.img fastboot_ksu_boot.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-Fastboot-KSU-Image
          path: repack/fastboot_ksu_boot.img
