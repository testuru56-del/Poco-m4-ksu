name: Fast Repack KSU Boot Image (No Compilation)

on:
  workflow_dispatch:

jobs:
  repack-boot:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip wget
          pip3 install gdown

      - name: Download Files (Stock Boot & KSU Image)
        run: |
          mkdir repack
          cd repack
          
          echo "Downloading Stock 64MB boot.img..."
          gdown 1FWNB6uFzPOsXR3o5APSP3k-Wg2hRYMdw -O stock_boot.img
          
          echo "Downloading 25MB KSU Engine..."
          # Yahan tumhari nayi file ki ID lag gayi hai
          gdown 1B4vYn0ZuPesPb40Q4ubs42_qrhxYyjuT -O kernel
          
          echo "Downloading MagiskBoot Tool..."
          wget https://github.com/vvb2060/magiskboot_build/releases/download/26.1/magiskboot_x86_64 -O magiskboot
          chmod +x magiskboot

      - name: Repack Image (The Magic)
        run: |
          cd repack
          
          echo "Unpacking Stock Boot..."
          ./magiskboot unpack stock_boot.img
          
          echo "Repacking with new KSU Engine..."
          # Tool apne aap 'kernel' naam ki file ko uthayega aur andar pack kar dega
          ./magiskboot repack stock_boot.img fastboot_ksu_boot.img

      - name: Upload Final Fastboot Image
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-Fastboot-KSU-Image
          path: repack/fastboot_ksu_boot.img
