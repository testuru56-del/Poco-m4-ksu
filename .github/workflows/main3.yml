name: KSU Next Build & Repack (Wi-Fi CRC Bypass)

on:
  workflow_dispatch:

jobs:
  build-and-repack:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang-14 lld-14 llvm-14 wget unzip
          pip3 install gdown

      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 -b light-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel-source

      - name: Fix Xiaomi Vendor Modules & Deep CRC Bypass
        run: |
          cd kernel-source
          rm -rf drivers/mihw
          sed -i '/mihw/d' drivers/Makefile || true
          sed -i '/mihw/d' drivers/Kconfig || true
          find arch/arm64/configs -type f -exec sed -i 's/CONFIG_MIHW=y/# CONFIG_MIHW is not set/g' {} +
          find scripts/dtc -type f -name "*.c*" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} +
          find scripts/dtc -type f -name "*.l" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} +
          
          # Wi-Fi Vermagic Spoofing
          sed -i 's/echo "\$res"/echo "-perf-gb889dbe59f09"/g' scripts/setlocalversion

      - name: Inject KSU NEXT (The Real Game Changer)
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash

      - name: Configure Kernel (Disable Security Checks)
        run: |
          cd kernel-source
          make O=out ARCH=arm64 light_defconfig
          
          # Core KSU Next Requirements
          echo "CONFIG_KPROBES=y" >> out/.config
          echo "CONFIG_HAVE_KPROBES=y" >> out/.config
          echo "CONFIG_KPROBE_EVENTS=y" >> out/.config
          echo "CONFIG_OVERLAY_FS=y" >> out/.config
          
          # The Wi-Fi CRC Disable Magic
          echo "# CONFIG_MODVERSIONS is not set" >> out/.config
          echo "CONFIG_MODULE_FORCE_LOAD=y" >> out/.config
          echo "CONFIG_MODULE_SIG=n" >> out/.config
          
          # Compiler Fixes
          echo "# CONFIG_MIHW is not set" >> out/.config
          sed -i 's/CONFIG_LTO=y/# CONFIG_LTO is not set/g' out/.config
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/g' out/.config
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/g' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig

      - name: Compile KSU Next Kernel
        run: |
          cd kernel-source
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 STRIP=llvm-strip-14 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTCFLAGS="-fcommon -w" HOSTLDFLAGS="-z muldefs" KCFLAGS="-w"

      - name: Setup Repack Environment
        if: success()
        run: |
          mkdir repack
          cd repack
          echo "Downloading Stock Boot (64MB)..."
          gdown "1FWNB6uFzPOsXR3o5APSP3k-Wg2hRYMdw" -O stock_boot.img
          wget -qO magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: Repack Final KSU Next Image
        if: success()
        run: |
          cd repack
          ./magiskboot unpack stock_boot.img
          rm -f kernel
          cp ../kernel-source/out/arch/arm64/boot/Image kernel
          ./magiskboot repack stock_boot.img fastboot_ksu_next_boot.img

      - name: Upload KSU Next Fastboot Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-KSU-NEXT-Image
          path: repack/fastboot_ksu_next_boot.img
