name: Fast Repack KSU Boot Image (Fixed Final)

on:
  workflow_dispatch:

jobs:
  repack-boot:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

      - name: Download Files
        run: |
          mkdir repack
          cd repack
          
          echo "Downloading Stock Boot..."
          wget -qO stock_boot.img "https://drive.google.com/uc?export=download&id=1FWNB6uFzPOsXR3o5APSP3k-Wg2hRYMdw"
          
          echo "Downloading KSU Image..."
          wget -qO kernel "https://drive.google.com/uc?export=download&id=1B4vYn0ZuPesPb40Q4ubs42_qrhxYyjuT"
          
          echo "Downloading MagiskBoot..."
          # Link bina space ke
          wget -qO magiskboot "https://raw.githubusercontent.com/topjohnwu/Magisk/master/native/build/bin/x86_64/magiskboot"
          chmod +x magiskboot

      - name: Repack Image
        run: |
          cd repack
          ./magiskboot unpack stock_boot.img
          ./magiskboot repack stock_boot.img fastboot_ksu_boot.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-Fastboot-KSU-Image
          path: repack/fastboot_ksu_boot.img

