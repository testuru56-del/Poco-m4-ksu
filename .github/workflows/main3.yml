name: Fast Repack KSU Boot Image (Fixed)

on:
  workflow_dispatch:

jobs:
  repack-boot:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip wget
          pip3 install gdown

      - name: Download Files
        run: |
          mkdir repack
          cd repack
          
          # ID for Stock Boot (Isme koi underscore nahi hai, ye safe hai)
          gdown "1FWNB6uFzPOsXR3o5APSP3k-Wg2hRYMdw" -O stock_boot.img
          
          # KSU Engine ID -> DHYAN RAHE: 42 aur qrh ke beech UNDERSCORE (_) hona chahiye!
          gdown "1B4vYn0ZuPesPb40Q4ubs42_qrhxYyjuT" -O kernel
          
          # MagiskBoot Link -> DHYAN RAHE: x86 aur 64 ke beech UNDERSCORE (_) hona chahiye!
          wget -qO magiskboot "https://github.com/vvb2060/magiskboot_build/releases/download/26.1/magiskboot_x86_64"
          chmod +x magiskboot

      - name: Repack Image
        run: |
          cd repack
          ./magiskboot unpack stock_boot.img
          ./magiskboot repack stock_boot.img fastboot_ksu_boot.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-Fastboot-KSU-Image
          path: repack/fastboot_ksu_boot.img
