name: Fast Repack KSU Boot Image (Python Method)

on:
  workflow_dispatch:

jobs:
  repack-boot:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install gdown

      - name: Download Files
        run: |
          mkdir repack
          cd repack
          
          echo "Downloading Stock Boot (64MB)..."
          gdown "1FWNB6uFzPOsXR3o5APSP3k-Wg2hRYMdw" -O stock_boot.img
          
          echo "Downloading KSU Engine (25MB)..."
          gdown "1B4vYn0ZuPesPb40Q4ubs42_qrhxYyjuT" -O kernel

      - name: Python Repack Magic
        run: |
          cd repack
          
          # Downloading a lightweight, reliable Python repacker
          curl -sL https://raw.githubusercontent.com/cfig/Android_boot_image_editor/master/unpack.py -o unpack.py
          curl -sL https://raw.githubusercontent.com/cfig/Android_boot_image_editor/master/pack.py -o pack.py
          
          echo "Unpacking Stock Boot..."
          python3 unpack.py stock_boot.img
          
          echo "Injecting KSU Engine..."
          cp kernel boot/kernel
          
          echo "Repacking Boot Image..."
          python3 pack.py
          
          # Renaming output for clarity
          mv boot.img fastboot_ksu_boot.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Poco-M4-Fastboot-KSU-Image
          path: repack/fastboot_ksu_boot.img
